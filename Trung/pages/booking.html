<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Đặt Phòng | SkyLight Hotel</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/style.css">
    <script src="../js/app.js"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-6">

    <div class="glass-panel p-6 rounded-2xl flex flex-col gap-4 w-full max-w-4xl shadow-2xl animate-fade-in">
        <div class="flex justify-between items-center border-b border-outline-variant/30 pb-3">
            <h2 class="text-xl font-bold text-primary">Tìm Kiếm Phòng Trống</h2>
            <a href="../index.html" class="text-sm text-secondary hover:underline flex items-center gap-1">
                <span class="material-symbols-outlined text-sm">home</span> Về trang chủ
            </a>
        </div>

        <div class="flex flex-col md:flex-row items-center gap-4">
            <!-- Ngày đến -->
            <div class="flex-1 flex items-center p-4 gap-4 border border-outline-variant/40 rounded-xl bg-white w-full">
                <span class="material-symbols-outlined text-primary">calendar_today</span>
                <div class="flex flex-col w-full">
                    <span class="text-xs text-on-surface-variant uppercase font-semibold">Ngày Đến</span>
                    <input class="bg-transparent border-none p-0 text-on-surface font-semibold focus:ring-0 w-full cursor-pointer" type="text" value="12 Th10, 2024"/>
                </div>
            </div>
            <!-- Ngày đi -->
            <div class="flex-1 flex items-center p-4 gap-4 border border-outline-variant/40 rounded-xl bg-white w-full">
                <span class="material-symbols-outlined text-primary">calendar_month</span>
                <div class="flex flex-col w-full">
                    <span class="text-xs text-on-surface-variant uppercase font-semibold">Ngày Đi</span>
                    <input class="bg-transparent border-none p-0 text-on-surface font-semibold focus:ring-0 w-full cursor-pointer" type="text" value="15 Th10, 2024"/>
                </div>
            </div>
            <!-- Số lượng khách -->
            <div class="flex-1 flex items-center p-4 gap-4 border border-outline-variant/40 rounded-xl bg-white w-full">
                <span class="material-symbols-outlined text-primary">group</span>
                <div class="flex flex-col w-full">
                    <span class="text-xs text-on-surface-variant uppercase font-semibold">Khách Hàng</span>
                    <input class="bg-transparent border-none p-0 text-on-surface font-semibold focus:ring-0 w-full cursor-pointer" type="text" value="2 Người Lớn"/>
                </div>
            </div>
        </div>

        <button class="bg-primary text-on-primary h-14 w-full rounded-xl font-bold hover:bg-primary-container transition-all flex items-center justify-center gap-2 mt-2">
            <span class="material-symbols-outlined">search</span>
            Kiểm tra phòng trống ngay
        </button>
    </div>

</body>
</html>

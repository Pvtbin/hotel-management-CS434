<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="utf-8"/>
    <title>Đăng Ký | SkyLight Hotel</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/style.css">
  <script src="../js/app.js"></script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-6">
    <div class="bg-white p-8 rounded-2xl shadow-lg border border-outline-variant/30 w-full max-w-md">
        <h2 class="text-2xl font-bold text-primary mb-2 text-center">Tạo Tài Khoản</h2>
        <p class="text-center text-sm text-slate-500 mb-6">Trở thành hội viên để nhận ưu đãi lên đến 25%</p>
        
        <form class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Họ và tên</label>
                <input type="text" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-primary focus:border-primary" placeholder="Nguyễn Văn A">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Địa chỉ Email</label>
                <input type="email" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-primary focus:border-primary" placeholder="example@gmail.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Mật khẩu</label>
                <input type="password" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-primary focus:border-primary" placeholder="Tối thiểu 6 ký tự">
            </div>
            <button type="submit" class="w-full py-3 bg-primary text-white font-bold rounded-lg hover:bg-opacity-90 transition-all">Đăng Ký</button>
        </form>
        <p class="text-center text-sm mt-4 text-slate-600">Đã có tài khoản? <a href="login.html" class="text-primary hover:underline">Đăng nhập</a></p>
    </div>
</body>
</html>
